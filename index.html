<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altura Capital - Coming Soon</title>
    <style>
        body {
            font-family: 'Avenir Next', 'Avenir', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            text-align: center;
            color: #333;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        img {
            max-width: 300px;
            height: auto;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5em;
            color: #3e613c;
            font-weight: 400;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        form {
            margin-top: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #3e613c;
            font-size: 1.2em;
        }
        input[type="email"] {
            padding: 12px;
            width: 300px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            font-weight: 400;
            font-size: 1.1em;
        }
        button[type="submit"] {
            padding: 12px 24px;
            background-color: #3e613c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 400;
            font-size: 1.1em;
        }
        button[type="submit"]:hover {
            background-color: #2e4e2b;
        }

        /* ── Screener button ── */
        .screener-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 13px 28px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1.05em;
            letter-spacing: 0.5px;
            border: 1px solid #000;
            transition: background-color 0.2s, color 0.2s;
        }
        .screener-button:hover {
            background-color: #3e613c;
            border-color: #3e613c;
        }
        .screener-button .beta-pill {
            background-color: #3e613c;
            color: #fff;
            font-size: 0.65em;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 3px;
            transition: background-color 0.2s;
        }
        .screener-button:hover .beta-pill {
            background-color: #000;
        }
        .screener-note {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            input[type="email"] {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="phonto 19.png" alt="Altura Capital Logo">
        <h1>Watch This Space. The home of Altura Capital is under construction.🚧</h1>
        <form action="https://formspree.io/f/xblwlyno" method="POST">
            <label for="email">Sign up for our newsletter to get in the know.</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Subscribe</button>
        </form>
        <a href="altura_luse_screener.html" class="screener-button">
            Stock Screener <span class="beta-pill">Beta</span>
        </a>
    </div>
</body>
</html>
